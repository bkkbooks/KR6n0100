front:
  text: 大乘百法明門論科分二初題目二初所造論題大乘藝五後能造論人天親後本文二初承聖言以標宗如世後設問答以明宗二先答百法二初略舉五位暗該百法二初舉百法無我合問何等後列前後分答二問二初總標一切後別明三初標一者次釋一者後結如是後重舉五位詳列百法分五一心法二一標章第一二別列三初前轉識一次七識士後八識八二心所有法二初總標章門第二後別標列六一遍行二初標章一遍後列名一作二別境二初標章二別後列名一欲三善所二初標章三善後列名一信四根本惑二初標章四煩後列名一貪五隨惑二初標章五隨後列名一忿六不定二初標章六不後列名一睡三色法二初標章第三後列名一眼四不相應行法二初標章第四後列名一得五無為法二初標章第五後列名一虛後答無我二初標言無二列二初人無我一補二法無我二法大乘百法明門論科貫
